name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lockfile — npm-host + HTTPS + integrity + name checks
        run: npm run lint:lockfile
      - name: Prod-dep audit — high/critical gate (path-aware, see scripts/audit-prod.mjs)
        run: npm run audit:prod
      - name: Contracts — compile + full mock suite (disperse, privacy, footguns)
        run: npm run test:contracts
      - name: Widget — type-check + build
        run: npm run build --workspace packages/dispersekit
      - name: Demo host — type-check + build
        run: npm run build --workspace packages/dispersekit-docs
